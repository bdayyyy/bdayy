<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 110">
  <!-- Can body -->
  <rect x="10" y="20" width="40" height="75" rx="8" fill="#C0392B"/>
  <!-- Silver top -->
  <ellipse cx="30" cy="20" rx="20" ry="6" fill="#BDC3C7"/>
  <!-- Silver bottom -->
  <ellipse cx="30" cy="95" rx="20" ry="6" fill="#95A5A6"/>
  <!-- Tab -->
  <rect x="24" y="14" width="12" height="8" rx="3" fill="#95A5A6"/>
  <!-- Label -->
  <rect x="12" y="35" width="36" height="45" rx="4" fill="#E74C3C"/>
  <!-- Coca-Cola script -->
  <text x="30" y="52" text-anchor="middle" font-family="serif" font-size="7" fill="white" font-style="italic" font-weight="bold">Coca-Cola</text>
  <!-- Diet text -->
  <text x="30" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="bold">diet</text>
  <!-- Silver stripe -->
  <rect x="12" y="70" width="36" height="6" fill="silver" opacity="0.7"/>
</svg>
